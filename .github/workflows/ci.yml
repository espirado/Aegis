name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Lint
        run: |
          go vet ./...
          gofmt -l . | grep . && exit 1 || true
      - name: Test
        run: go test ./... -v -race -count=1

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
      - name: Lint
        run: |
          ruff check ml/ scripts/ test/
      - name: Test
        run: python -m pytest test/ ml/ -v --tb=short
