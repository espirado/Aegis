# AEGIS Configuration
# Override with AEGIS_CONFIG_PATH environment variable

proxy:
  listen_addr: ":8080"
  agent_url: "http://localhost:9000"
  read_timeout: 30s
  write_timeout: 30s

thresholds:
  auto_proceed: 0.85
  hold_and_notify: 0.60
  phi_multiplier: 1.5

classifier:
  model_path: "ml/models/classifier_v1.onnx"
  vocab_path: "ml/models/vocab.txt"
  max_input_len: 128
  inference_timeout: 10ms

# Layer 2 auditor — supports multiple LLM backends.
# provider: "openai" | "anthropic" | "ollama"
#   openai     — OpenAI API (also works with vLLM, llama.cpp, LM Studio)
#   anthropic  — Anthropic Messages API (Claude)
#   ollama     — Ollama (shorthand, sets base_url to localhost:11434)
auditor:
  provider: "ollama"
  base_url: "http://localhost:11434/v1"
  api_key: ""           # not needed for Ollama
  model: "llama3.1:8b"  # local L2 auditor model
  timeout: 30s          # Ollama can be slower than cloud APIs

sanitizer:
  ner_model_path: "ml/models/phi_ner_v1.onnx"
  redact_mode: "redact"  # "redact" masks PHI in output; "block" rejects entire response

notify:
  webhook_url: ""  # Set via AEGIS_NOTIFY_WEBHOOK env var
  timeout: 30s
  default_on_timeout: "proceed"  # "proceed" or "block"

audit:
  output: "stdout"  # "stdout", "file", or "both"
  file_path: "/var/log/aegis/audit.jsonl"
  redact_flagged_content: true

metrics:
  enabled: true
  listen_addr: ":9090"
  path: "/metrics"

logging:
  level: "info"
  format: "json"
